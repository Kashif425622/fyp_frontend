
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Academic Management Portal</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-slate-100">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ================= LOGIN ================= */
function Login({ onLogin }) {
  const submit = e => {
    e.preventDefault();
    onLogin();
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-tr from-rose-600 via-orange-500 to-amber-400">
      <form onSubmit={submit}
        className="bg-white p-10 rounded-2xl shadow-2xl w-96">

        <h2 className="text-3xl font-bold text-center text-rose-600 mb-2">
          Academic Portal
        </h2>
        <p className="text-center text-gray-500 mb-6">
          Faculty / Student Login
        </p>

        <input className="w-full p-3 border rounded mb-4"
          placeholder="User ID" />

        <input className="w-full p-3 border rounded mb-6"
          placeholder="Password" type="password" />

        <button className="w-full bg-rose-600 text-white py-3 rounded-lg hover:bg-rose-700">
          Sign In
        </button>
      </form>
    </div>
  );
}

/* ================= SIDEBAR ================= */
function Sidebar({ setTab, logout }) {
  const tabs = [
    "Overview",
    "Faculty",
    "Timetable",
    "Examinations",
    "Results",
    "Notices",
    "Reports",
    "Support"
  ];

  return (
    <div className="w-64 bg-gradient-to-b from-slate-900 to-slate-800 text-white min-h-screen p-5">
      <h2 className="text-2xl font-bold text-center mb-8">
        📘 Academic Panel
      </h2>

      {tabs.map(tab => (
        <button key={tab}
          onClick={() => setTab(tab)}
          className="w-full text-left px-4 py-3 rounded-lg hover:bg-rose-600 mb-2 transition">
          {tab}
        </button>
      ))}

      <button onClick={logout}
        className="mt-8 w-full bg-red-600 py-2 rounded-lg hover:bg-red-700">
        Logout
      </button>
    </div>
  );
}

/* ================= CONTENT ================= */
function Content({ tab }) {
  return (
    <div className="flex-1 p-8 bg-slate-100 overflow-y-auto">

      {tab === "Overview" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Overview</h1>

          <div className="grid grid-cols-4 gap-6 mb-6">
            <Stat title="Departments" value="12" />
            <Stat title="Faculty" value="86" />
            <Stat title="Students" value="2,450" />
            <Stat title="Courses" value="148" />
          </div>

          <div className="bg-white p-6 rounded-xl shadow">
            <h3 className="text-xl font-semibold mb-2">System Summary</h3>
            <p className="text-gray-600">
              This academic portal manages faculty schedules, examinations,
              student results, institutional notices, and administrative reports.
            </p>
          </div>
        </>
      )}

      {tab === "Faculty" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Faculty Directory</h1>
          <div className="grid grid-cols-3 gap-6">
            {["Dr. Mehta","Dr. Rao","Dr. Singh","Dr. Iyer","Dr. Khan"].map(f => (
              <div className="bg-white p-4 rounded-xl shadow text-center">
                <img src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png"
                  className="w-20 mx-auto mb-2"/>
                <p className="font-semibold">{f}</p>
                <p className="text-sm text-gray-500">Professor</p>
              </div>
            ))}
          </div>
        </>
      )}

      {tab === "Timetable" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Class Timetable</h1>
          <table className="w-full bg-white rounded-xl shadow">
            <thead className="bg-rose-600 text-white">
              <tr>
                <th className="p-3">Day</th>
                <th>9–11</th>
                <th>11–1</th>
                <th>2–4</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Mon","DSA","OS","DBMS"],
                ["Tue","Maths","OS","Project"],
                ["Wed","DBMS","DSA","Elective"],
                ["Thu","OS","Maths","Lab"],
                ["Fri","Project","Elective","Seminar"]
              ].map(r=>(
                <tr className="border-b text-center">
                  {r.map(c=><td className="p-3">{c}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}

      {tab === "Examinations" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Examinations</h1>
          <ul className="space-y-4">
            <li className="bg-white p-4 rounded-xl shadow">Mid-Semester Exam – March 10</li>
            <li className="bg-white p-4 rounded-xl shadow">Practical Exams – April 5</li>
            <li className="bg-white p-4 rounded-xl shadow">End-Semester Exam – May 20</li>
          </ul>
        </>
      )}

      {tab === "Results" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Results</h1>
          <div className="grid grid-cols-2 gap-6">
            {["Semester 1","Semester 2","Semester 3","Semester 4"].map(s=>(
              <div className="bg-white p-6 rounded-xl shadow text-center">
                <p className="text-xl font-semibold">{s}</p>
                <p className="text-green-600 font-bold">Published</p>
              </div>
            ))}
          </div>
        </>
      )}

      {tab === "Notices" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Notices</h1>
          <ul className="list-disc pl-6 space-y-2 text-gray-700">
            <li>Internal audit scheduled next week</li>
            <li>Faculty meeting on Friday</li>
            <li>Holiday declared on national festival</li>
          </ul>
        </>
      )}

      {tab === "Reports" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Reports</h1>
          <div className="bg-white p-6 rounded-xl shadow space-y-2">
            <p>✔ Academic Performance Report</p>
            <p>✔ Attendance Analysis</p>
            <p>✔ Faculty Workload Report</p>
            <p>✔ Examination Summary</p>
          </div>
        </>
      )}

      {tab === "Support" && (
        <>
          <h1 className="text-3xl font-bold text-rose-600 mb-6">Support</h1>
          <div className="bg-white p-6 rounded-xl shadow">
            <p>Email: support@university.edu</p>
            <p>Phone: +91-98765-43210</p>
            <p>Office Hours: 9 AM – 5 PM</p>
          </div>
        </>
      )}

    </div>
  );
}

/* SMALL COMPONENT */
const Stat = ({title,value}) => (
  <div className="bg-white p-6 rounded-xl shadow text-center">
    <p className="text-gray-500">{title}</p>
    <p className="text-3xl font-bold text-rose-600">{value}</p>
  </div>
);

/* ================= DASHBOARD ================= */
function Dashboard({ logout }) {
  const [tab, setTab] = useState("Overview");
  return (
    <div className="flex h-screen">
      <Sidebar setTab={setTab} logout={logout} />
      <Content tab={tab} />
    </div>
  );
}

/* ================= APP ================= */
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  return loggedIn
    ? <Dashboard logout={() => setLoggedIn(false)} />
    : <Login onLogin={() => setLoggedIn(true)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
