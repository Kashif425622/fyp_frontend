<div id="settings" class="tab hidden">
<h1 class="text-2xl font-bold mb-6">Settings</h1>

<!-- ACCOUNT SECURITY -->
<div class="bg-white p-4 rounded shadow mb-4">
<h2 class="font-bold mb-3">🔐 Account Security</h2>

<label class="block mb-2 text-sm">Current Password</label>
<input type="password" class="border p-2 rounded w-72 mb-3">

<label class="block mb-2 text-sm">New Password</label>
<input type="password" class="border p-2 rounded w-72 mb-3">

<label class="block mb-2 text-sm">Confirm New Password</label>
<input type="password" class="border p-2 rounded w-72 mb-3">

<button class="bg-blue-600 text-white px-4 py-2 rounded">
Update Password
</button>
</div>

<!-- NOTIFICATION SETTINGS -->
<div class="bg-white p-4 rounded shadow mb-4">
<h2 class="font-bold mb-3">🔔 Notification Preferences</h2>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox" checked>
Email Notifications (Exams, Fees)
</label>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox">
SMS Alerts (Attendance Shortage)
</label>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox" checked>
ERP Announcements
</label>
</div>

<!-- PRIVACY SETTINGS -->
<div class="bg-white p-4 rounded shadow mb-4">
<h2 class="font-bold mb-3">🛡 Privacy Settings</h2>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox" checked>
Show Profile to Faculty
</label>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox">
Allow Contact by Admin
</label>
</div>

<!-- DEVICE & SESSION -->
<div class="bg-white p-4 rounded shadow mb-4">
<h2 class="font-bold mb-3">💻 Device & Login Activity</h2>

<table class="w-full text-sm">
<tr class="bg-gray-200">
<th class="p-2 text-left">Device</th>
<th class="p-2 text-left">Location</th>
<th class="p-2 text-left">Last Active</th>
</tr>
<tr>
<td class="p-2">Chrome (Windows)</td>
<td class="p-2">Delhi</td>
<td class="p-2">Today 10:30 AM</td>
</tr>
<tr>
<td class="p-2">Mobile App</td>
<td class="p-2">Delhi</td>
<td class="p-2">Yesterday</td>
</tr>
</table>

<button class="mt-3 bg-red-600 text-white px-3 py-1 rounded">
Logout from all devices
</button>
</div>

<!-- PREFERENCES -->
<div class="bg-white p-4 rounded shadow mb-4">
<h2 class="font-bold mb-3">⚙ System Preferences</h2>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox" checked>
Enable Dark Mode
</label>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox">
Compact Sidebar View
</label>

<label class="flex items-center gap-2 mb-2">
<input type="checkbox" checked>
Auto-save Forms
</label>
</div>

</div>
