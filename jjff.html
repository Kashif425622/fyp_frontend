
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>University Student Portal</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ================= LOGIN ================= */
function Login({ onLogin }) {
  function handleSubmit(e) {
    e.preventDefault();
    onLogin();
  }

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-r from-blue-700 to-purple-700">
      <form onSubmit={handleSubmit} className="bg-white p-10 rounded-xl shadow-2xl w-96">
        <h2 className="text-3xl font-bold text-center mb-6 text-blue-700">
          Student Login
        </h2>

        <input className="w-full p-3 border rounded mb-4" placeholder="Student Email" />
        <input className="w-full p-3 border rounded mb-6" placeholder="Password" type="password"/>

        <button className="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700">
          Login
        </button>
      </form>
    </div>
  );
}

/* ================= SIDEBAR ================= */
function Sidebar({ setTab, logout }) {
  const tabs = ["Dashboard","Profile","Courses","Attendance","Grades","Fees","Library","Settings"];

  return (
    <div className="w-64 bg-gradient-to-b from-gray-900 to-gray-800 text-white min-h-screen p-4">
      <h2 className="text-2xl font-bold mb-6 text-center">🎓 Student Panel</h2>

      {tabs.map(tab => (
        <button key={tab}
          onClick={() => setTab(tab)}
          className="w-full text-left px-4 py-3 rounded hover:bg-blue-600 mb-2">
          {tab}
        </button>
      ))}

      <button onClick={logout}
        className="mt-6 w-full bg-red-600 py-2 rounded hover:bg-red-700">
        Logout
      </button>
    </div>
  );
}

/* ================= CONTENT ================= */
function Content({ tab }) {
  return (
    <div className="flex-1 p-8 bg-gray-50 overflow-y-auto">

      {/* DASHBOARD */}
      {tab === "Dashboard" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Dashboard Overview</h1>

          <div className="grid grid-cols-4 gap-6 mb-8">
            <Card title="Attendance" value="87%" color="green" />
            <Card title="CGPA" value="8.6" color="blue" />
            <Card title="Pending Fees" value="₹25,000" color="red" />
            <Card title="Issued Books" value="2" color="purple" />
          </div>

          <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f"
               className="rounded-xl shadow-lg w-full h-64 object-cover"/>
        </>
      )}

      {/* PROFILE */}
      {tab === "Profile" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Student Profile</h1>
          <div className="bg-white p-6 rounded-xl shadow grid grid-cols-2 gap-6">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                 className="w-40"/>
            <div className="space-y-2 text-lg">
              <p><b>Name:</b> John Doe</p>
              <p><b>Roll No:</b> UNI2025CS01</p>
              <p><b>Department:</b> Computer Science</p>
              <p><b>Year:</b> 3rd Year</p>
              <p><b>Email:</b> john@university.edu</p>
              <p><b>Status:</b> Active</p>
            </div>
          </div>
        </>
      )}

      {/* COURSES */}
      {tab === "Courses" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Enrolled Courses</h1>
          <table className="w-full bg-white shadow rounded">
            <thead className="bg-blue-600 text-white">
              <tr>
                <th className="p-3">Course</th>
                <th>Faculty</th>
                <th>Credits</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Data Structures","Dr. Sharma",4,"Ongoing"],
                ["Operating Systems","Dr. Khan",4,"Ongoing"],
                ["DBMS","Dr. Patel",3,"Completed"],
                ["Web Development","Dr. Roy",3,"Ongoing"]
              ].map(c=>(
                <tr className="border-b text-center">
                  {c.map(i=><td className="p-3">{i}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </>
      )}

      {/* ATTENDANCE */}
      {tab === "Attendance" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Attendance Record</h1>
          <div className="space-y-4">
            <Progress label="Data Structures" value="90%" />
            <Progress label="Operating Systems" value="85%" />
            <Progress label="DBMS" value="92%" />
            <Progress label="Web Development" value="80%" />
          </div>
        </>
      )}

      {/* GRADES */}
      {tab === "Grades" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Academic Grades</h1>
          <ul className="grid grid-cols-2 gap-6">
            {["DSA - A","OS - B+","DBMS - A-","Web Dev - A"].map(g=>(
              <li className="bg-white p-6 shadow rounded-xl text-xl">{g}</li>
            ))}
          </ul>
        </>
      )}

      {/* FEES */}
      {tab === "Fees" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Fees Details</h1>
          <div className="bg-white p-6 rounded shadow space-y-2">
            <p>Total Fees: ₹1,00,000</p>
            <p>Paid: ₹75,000</p>
            <p className="text-red-600 font-bold">Pending: ₹25,000</p>
          </div>
        </>
      )}

      {/* LIBRARY */}
      {tab === "Library" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Library Records</h1>
          <ul className="space-y-4">
            <li className="bg-white p-4 rounded shadow">📘 Clean Code – Due: 20 Feb</li>
            <li className="bg-white p-4 rounded shadow">📗 OS Concepts – Due: 20 Feb</li>
          </ul>
        </>
      )}

      {/* SETTINGS */}
      {tab === "Settings" && (
        <>
          <h1 className="text-3xl font-bold mb-6 text-blue-700">Settings</h1>
          <div className="bg-white p-6 rounded shadow space-y-4">
            <button className="bg-blue-600 text-white px-6 py-2 rounded">Change Password</button>
            <button className="bg-green-600 text-white px-6 py-2 rounded">Update Profile</button>
            <button className="bg-gray-700 text-white px-6 py-2 rounded">Notifications</button>
          </div>
        </>
      )}

    </div>
  );
}

/* SMALL COMPONENTS */
const Card = ({title,value,color}) => (
  <div className={`bg-${color}-100 p-6 rounded-xl shadow text-center`}>
    <h3 className="text-lg">{title}</h3>
    <p className={`text-3xl font-bold text-${color}-700`}>{value}</p>
  </div>
);

const Progress = ({label,value}) => (
  <div>
    <p className="mb-1">{label} ({value})</p>
    <div className="w-full bg-gray-300 rounded">
      <div className="bg-blue-600 h-4 rounded" style={{width:value}}></div>
    </div>
  </div>
);

/* ================= DASHBOARD ================= */
function Dashboard({ logout }) {
  const [tab, setTab] = useState("Dashboard");
  return (
    <div className="flex h-screen">
      <Sidebar setTab={setTab} logout={logout} />
      <Content tab={tab} />
    </div>
  );
}

/* ================= APP ================= */
function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  return loggedIn ? <Dashboard logout={()=>setLoggedIn(false)} /> : <Login onLogin={()=>setLoggedIn(true)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
